[build]
  # 构建命令
  command = "npm run build"

  # 发布目录
  publish = "dist"

  # 构建环境变量
  [build.environment]
    NODE_VERSION = "20"

# 重定向规则
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 缓存设置
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# 静态资源缓存
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
